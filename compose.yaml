services:
  app:
    build:
      context: .
      target: streamlit
    restart: unless-stopped
    env_file: .env
    networks:
      - internal

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      - app

  fastapi:
    build:
      context: .
      target: api
    restart: unless-stopped
    env_file: .env
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: performance_plus
      POSTGRES_USER: ppuser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ppuser -d performance_plus"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
